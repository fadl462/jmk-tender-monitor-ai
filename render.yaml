services:
  - type: web
    name: jmk-tender-monitor-ai
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: DIGEST_FROM
        sync: false
      - key: DIGEST_RECIPIENTS
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: MIN_MATCH_SCORE
        value: "40"
      - key: MIN_GHANA_JOB_RESULTS
        value: "5"
      - key: FEED_WINDOW_DAYS
        value: "30"
